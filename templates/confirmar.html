<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Confirmação de Código</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/cadastro.css') }}">
</head>
<body>
  <div class="container">
    <h2>Digite o código enviado ao seu e-mail</h2>

    <form method="POST">
      <input type="text" name="codigo" placeholder="Código de 6 dígitos" required maxlength="6">
      <button type="submit">Confirmar</button>
    </form>

    {% with mensagens = get_flashed_messages() %}
      {% if mensagens %}
        <p>{{ mensagens[0] }}</p>
      {% endif %}
    {% endwith %}

  </div>
</body>
</html>
