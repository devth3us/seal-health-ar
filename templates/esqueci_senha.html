<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de senha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/recuperar.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Recuperar senha</h2>
        <form action="{{ url_for('recuperar.enviar_codigo') }}" method="POST">
            <input type="text" name="email" placeholder="Digite seu e-mail" required>
            <button type="submit">Enviar código</button>
        </form>
        <p><a href="{{ url_for('login_usuario') }}">Voltar para o login</a></p>
    </div>
</body>
</html>
