
<div>

    <input type="text" name="tell"><br><br>

      <option value="ADM">Administrador</option>
    </select><br><br>

<script>
    // --- um calculo do CPF ---
    function validarCPF(cpf) {
      cpf = cpf.replace(/[^\d]+/g,'');
      if(cpf == '' || cpf.length != 11) return false;
      if (/^(\d)\1{10}$/.test(cpf)) return false;

      let soma = 0, resto;
      for (let i=1; i<=9; i++) soma += parseInt(cpf.substring(i-1,i)) * (11-i);
      resto = (soma * 10) % 11;
      if ((resto == 10) || (resto == 11)) resto = 0;
      if (resto != parseInt(cpf.substring(9,10))) return false;

      soma = 0;
      for (let i=1; i<=10; i++) soma += parseInt(cpf.substring(i-1,i)) * (12-i);
      resto = (soma * 10) % 11;
      if ((resto == 10) || (resto == 11)) resto = 0;
      if (resto != parseInt(cpf.substring(10,11))) return false;

      return true;
    }

    // ---fazendo a busca do CEP (ViaCEP) como o Prof Marcos Costa falou ---
    document.getElementById("cep").addEventListener("blur", async function(){
      let cep = this.value.replace(/\D/g, '');
      if(cep.length !== 8){ 
        Swal.fire("CEP inválido!", "Digite um CEP com 8 números.", "error");
        return;
      }

      try {
        let response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        let data = await response.json();

        if(data.erro){
          Swal.fire("CEP não encontrado!", "", "error");
        } else {
          document.getElementById("endereco").value = data.logradouro || "";
          document.getElementById("bairro").value = data.bairro || "";
          document.getElementById("cidade").value = data.localidade || "";
          document.getElementById("estado").value = data.uf || "";
        }
      } catch (e){
        Swal.fire("Erro ao buscar CEP.", "", "error");
      }
    });

    // --- Validação antes de enviar ---
    document.getElementById("cadastroForm").addEventListener("submit", function(e){
      let cpf = document.getElementById("cpf").value;
      let nasc = document.getElementById("dt_nasc").value;

      if(!validarCPF(cpf)){
        e.preventDefault();
        Swal.fire("CPF inválido!", "", "error");
        return;
      }

      
    });
  </script>
